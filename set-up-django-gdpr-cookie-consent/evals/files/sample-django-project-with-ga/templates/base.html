<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Site{% endblock %}</title>
    <link href="{% static 'css/main.css' %}" rel="stylesheet" />
    <!-- Google tag (gtag.js) -->

      function gtag(){dataLayer.push(arguments);}

</head>
<body>
    <header>
        <nav>

    </footer>

</html>
